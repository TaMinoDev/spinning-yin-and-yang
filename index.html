<!DOCTYPE html>
<html lang="de">
  <head>
    <title>Spinning Yin and Yang</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: Arial, sans-serif;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .image-container {
        position: relative;
        width: 300px;
        height: 300px;
      }

      #spinningImage {
        width: 100%;
        height: 100%;
        object-fit: contain;
        animation: spin linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .controls {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        gap: 15px;
        min-width: 300px;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      label {
        font-weight: bold;
        min-width: 120px;
        color: #333;
      }

      input[type="range"] {
        flex: 1;
        height: 6px;
        border-radius: 3px;
        background: #ddd;
        outline: none;
        -webkit-appearance: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #667eea;
        cursor: pointer;
      }

      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #667eea;
        cursor: pointer;
        border: none;
      }

      .speed-value {
        min-width: 60px;
        text-align: right;
        font-weight: bold;
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="image-container">
        <img id="spinningImage" src="main.png" alt="Spinning Yin and Yang">
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="speedSlider">Drehgeschwindigkeit:</label>
          <input 
            type="range" 
            id="speedSlider" 
            min="0.5" 
            max="5" 
            step="0.1" 
            value="1"
          >
          <span class="speed-value" id="speedValue">1.0x</span>
        </div>
      </div>
    </div>

    <script>
      const speedSlider = document.getElementById('speedSlider');
      const speedValue = document.getElementById('speedValue');
      const spinningImage = document.getElementById('spinningImage');

      // Event-Listener für den Slider
      speedSlider.addEventListener('input', (e) => {
        const speed = e.target.value;
        speedValue.textContent = speed + 'x';
        
        // Berechne die Animation-Dauer basierend auf der Geschwindigkeit
        // Bei 1x dauert eine Rotation 3 Sekunden
        const duration = 3 / speed;
        spinningImage.style.animationDuration = duration + 's';
      });

      // Initialisiere die Animation mit dem Standard-Wert
      const initialSpeed = speedSlider.value;
      const initialDuration = 3 / initialSpeed;
      spinningImage.style.animationDuration = initialDuration + 's';
    </script>
  </body>
</html>
